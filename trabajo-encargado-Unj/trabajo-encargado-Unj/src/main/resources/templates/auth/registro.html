<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - HIP URBAN STORE</title>
</head>
<body>
<th:block>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Crear Cuenta</h1>
            <p class="subtitulo">Únete a HIP URBAN STORE y descubre lo mejor en tecnología</p>

            <!-- Mensajes de error o éxito -->
            <div th:if="${error}" class="mensaje-error" th:text="${error}">Error</div>
            <div th:if="${exito}" class="mensaje-exito" th:text="${exito}">Éxito</div>

            <form class="auth-form" method="post" th:action="@{/auth/registro}">
                <div class="campo">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required>
                </div>

                <div class="campo">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8">
                </div>

                <div class="campo">
                    <label for="confirmar">Confirmar Contraseña</label>
                    <input type="password" id="confirmar" name="confirmar" placeholder="Repite tu contraseña" required>
                </div>

                <div class="terminos">
                    <label class="checkbox">
                        <input type="checkbox" required> Acepto los <a th:href="@{/info/terminos}">Términos y Condiciones</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-auth">Registrarse</button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a th:href="@{/auth/login}">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
