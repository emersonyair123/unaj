<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías</title>
</head>
<body>
<th:block>
    <h1>Gestión de Categorías</h1>

    <div class="acciones">
        <a th:href="@{/categorias/nuevo}" class="btn">Nueva Categoría</a>
    </div>

    <div th:if="${exito}" class="mensaje-exito" th:text="${exito}">Mensaje de éxito</div>

    <table class="tabla">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="categoria : ${categorias}">
            <td th:text="${categoria.id}">1</td>
            <td th:text="${categoria.nombre}">Nombre</td>
            <td th:text="${categoria.descripcion}">Descripción</td>
            <td>
                <a th:href="@{/categorias/editar/{id}(id=${categoria.id})}" class="btn-editar">Editar</a>
                <a th:href="@{/categorias/eliminar/{id}(id=${categoria.id})}" class="btn-eliminar"
                   onclick="return confirm('¿Eliminar esta categoría?')">Eliminar</a>
            </td>
        </tr>
        <tr th:if="${categorias.isEmpty()}">
            <td colspan="4">No hay categorías registradas</td>
        </tr>
        </tbody>
    </table>
</th:block>
</body>
</html>
