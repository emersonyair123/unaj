<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - HIP URBAN STORE</title>
</head>
<body>
<th:block>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Iniciar Sesión</h1>
            <p class="subtitulo">Bienvenido de vuelta a HIP URBAN STORE</p>

            <!-- Mensajes de error o éxito -->
            <div th:if="${error}" class="mensaje-error" th:text="${error}">Error</div>
            <div th:if="${exito}" class="mensaje-exito" th:text="${exito}">Éxito</div>

            <form class="auth-form" method="post" th:action="@{/auth/login}">
                <div class="campo">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="opciones">
                    <label class="checkbox">
                        <input type="checkbox" name="recordar"> Recordarme
                    </label>
                    <a th:href="@{/auth/recuperar}" class="olvido">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-auth">Ingresar</button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes cuenta? <a th:href="@{/auth/registro}">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
