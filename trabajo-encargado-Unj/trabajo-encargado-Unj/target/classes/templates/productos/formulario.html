<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${producto.id} ? 'Editar Producto' : 'Nuevo Producto'">Formulario Producto</title>
    <style>
        .preview-imagen {
            max-width: 200px;
            max-height: 200px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 5px;
            padding: 5px;
        }
        .imagen-actual {
            margin: 10px 0;
        }
        .imagen-actual img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <th:block>
        <div class="form-container">
            <h1 th:text="${producto.id} ? 'Editar Producto' : 'Nuevo Producto'">Formulario</h1>
            
            <form th:action="${producto.id} ? @{/productos/actualizar/{id}(id=${producto.id})} : @{/productos/guardar}" 
                  th:object="${producto}" method="post" enctype="multipart/form-data">
                
                <div class="campo">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required>
                </div>
                
                <div class="campo">
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" th:field="*{descripcion}" rows="3"></textarea>
                </div>
                
                <div class="campo">
                    <label for="precio">Precio (S/):</label>
                    <input type="number" id="precio" th:field="*{precio}" step="0.01" min="0" required>
                </div>
                
                <div class="campo">
                    <label for="stock">Stock:</label>
                    <input type="number" id="stock" th:field="*{stock}" min="0" required>
                </div>
                
                <div class="campo">
                    <label for="categoria">Categoría:</label>
                    <select id="categoria" th:field="*{categoria.id}" required>
                        <option value="">Seleccionar categoría</option>
                        <option th:each="cat : ${categorias}" 
                                th:value="${cat.id}" 
                                th:text="${cat.nombre}">
                        </option>
                    </select>
                </div>
                
                <div class="campo">
                    <label for="imagenFile">Imagen del Producto:</label>
                    <input type="file" id="imagenFile" name="imagenFile" accept="image/*" onchange="previsualizarImagen(event)">
                    <small>Formatos permitidos: JPG, PNG, GIF (Max 5MB)</small>
                    
                    <!-- Previsualización de la imagen seleccionada -->
                    <div id="preview-container" style="display: none;">
                        <p>Vista previa:</p>
                        <img id="preview" class="preview-imagen" src="#" alt="Vista previa">
                    </div>
                    
                    <!-- Imagen actual (si existe) -->
                    <div th:if="${producto.imagen}" class="imagen-actual">
                        <p>Imagen actual:</p>
                        <img th:src="@{/imagenes/{nombre}(nombre=${producto.imagen})}" alt="Imagen actual">
                    </div>
                </div>
                
                <div class="acciones">
                    <button type="submit" class="btn">Guardar</button>
                    <a th:href="@{/productos}" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </div>
        
        <script>
            function previsualizarImagen(event) {
                const input = event.target;
                const previewContainer = document.getElementById('preview-container');
                const preview = document.getElementById('preview');
                
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        previewContainer.style.display = 'block';
                    }
                    reader.readAsDataURL(input.files[0]);
                } else {
                    previewContainer.style.display = 'none';
                }
            }
        </script>
    </th:block>
</body>
</html>
